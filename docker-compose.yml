services:
  postgres:
    image: postgres:16-alpine  # ← Specify version 16
    container_name: postgres
    restart: always
    env_file:
      - ./postgres.env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  user-service:
    build: ./user-service
    container_name: user-service
    ports:
      - "5002:5002"
    env_file:
      - ./user-service/.env.docker
    depends_on:
      - postgres

  order-service:
    build: ./order-service
    container_name: order-service
    ports:
      - "5003:5003"
    env_file:
      - ./order-service/.env.docker
    depends_on:
      - postgres

  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "5001:5001"
    env_file:
      - ./api-gateway/.env.docker
    depends_on:
      - user-service
      - order-service

volumes:
  postgres_data: